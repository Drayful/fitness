name: fitness

services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fitness-api
    ports:
      - "${APP_PORT:-8000}:8000"
    volumes:
      - ./backend:/var/www/html
    environment:
      APP_ENV: ${APP_ENV:-local}
      APP_DEBUG: ${APP_DEBUG:-true}
      APP_URL: ${APP_URL:-http://127.0.0.1:8000}
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_DATABASE: ${POSTGRES_DB:-fitness}
      DB_USERNAME: ${POSTGRES_USER:-fitness}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-fitness}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16
    container_name: fitness-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-fitness}
      POSTGRES_USER: ${POSTGRES_USER:-fitness}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fitness}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - fitness_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

volumes:
  fitness_pgdata:
